<h1>
🎮 Foro Gamer
</h1>


<div id="posts">

</div>



<script>


fetch(
"http://localhost:3000/foro"
)

.then(r=>r.json())

.then(data=>{


let html="";


data.forEach(p=>{


html+=`

<div>

<h2>
${p.titulo}
</h2>

<p>
${p.contenido}
</p>

<b>
${p.usuario}
</b>

<hr>

</div>

`;


});


posts.innerHTML=html;


});


</script>
