<!DOCTYPE html>
<html>

<head>

<title>Catálogo Gamer</title>

<style>

body{

background:#09090f;
color:white;
font-family:Arial;
padding:30px;

}


input,select{

padding:15px;
margin:10px;
border-radius:8px;
border:0;

}


.grid{

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:25px;

}


.card{

background:#151522;
padding:20px;
border-radius:15px;

}


.card img{

width:100%;
height:200px;
object-fit:cover;
border-radius:10px;

}


h2{

color:#00ffff;

}


</style>


</head>


<body>


<h1>
🎮 Biblioteca Gamer
</h1>


<input 
id="buscar"
placeholder="Buscar juego..."
onkeyup="cargarJuegos()"
>


<select id="categoria"
onchange="cargarJuegos()">

<option value="">
Todas las categorías
</option>

<option>
Acción
</option>

<option>
RPG
</option>

<option>
Carreras
</option>

<option>
Emulación
</option>

</select>



<div 
class="grid"
id="lista">

</div>




<script>


function cargarJuegos(){


fetch(
"http://localhost:3000/juegos"
)

.then(r=>r.json())

.then(juegos=>{


let texto=
buscar.value.toLowerCase();


let cat=
categoria.value;



let html="";



juegos

.filter(j=>


j.nombre
.toLowerCase()
.includes(texto)

)


.filter(j=>

cat=="" ||
j.categoria==cat

)


.forEach(j=>{


html+=`

<div class="card">


<img src="http://localhost:3000/uploads/imagenes-juegos/${j.imagen}">


<h2>
${j.nombre}
</h2>


<p>
${j.categoria}
</p>


<p>
${j.descripcion}
</p>


<b>
Requisitos:
</b>

<p>
${j.requisitos}
</p>


</div>


`;


});



lista.innerHTML=html;


});


}



cargarJuegos();


</script>


</body>

</html>
